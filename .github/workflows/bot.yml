name: Maple Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node check.js
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit last.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last.json

          git diff --staged --quiet || git commit -m "Update last.json"

          git push
